<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Social Tipo Instagram</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        header {
            background-color: #ffffff;
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 10px;
        }
        .post {
            background-color: #ffffff;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .post img {
            max-width: 100%;
            border-radius: 5px;
        }
        .footer {
            text-align: center;
            padding: 20px;
            background-color: #ffffff;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>

<header>
    <h1>Mi Red Social</h1>
</header>

<div class="container">
    <div class="post">
        <img src="https://via.placeholder.com/600x400" alt="Publicación 1">
        <h3>Usuario 1</h3>
        <p>¡Miren este lugar increíble!</p>
    </div>

    <div class="post">
        <img src="https://via.placeholder.com/600x400" alt="Publicación 2">
        <h3>Usuario 2</h3>
        <p>¡Pasando un buen rato!</p>
    </div>

    <div class="post">
        <img src="https://via.placeholder.com/600x400" alt="Publicación 3">
        <h3>Usuario 3</h3>
        <p>Deliciosa comida en este restaurante.</p>
    </div>
</div>

<footer class="footer">
    <p>&copy; 2024 Mi Red Social</p>
</footer>

</body>
</html>
